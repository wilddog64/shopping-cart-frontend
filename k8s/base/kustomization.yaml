apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: shopping-cart-apps

resources:
  - deployment.yaml
  - service.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: shopping-cart

images:
  - name: shopping-cart/frontend
    newName: ghcr.io/wilddog64/shopping-cart-frontend
    newTag: latest
